<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #06060f;
            cursor: crosshair;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
            position: fixed;
            width: 100%;
        }
        /* ── Liquid spotlight blob ── */
        .liquid-blob {
            position: fixed;
            top: 0;
            left: 0;
            width: 170px;
            height: 170px;
            background-color: #ffffff;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: difference;
            filter: blur(28px);
            animation: morph 5s ease-in-out infinite;
            will-change: transform, border-radius;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .liquid-blob.active { opacity: 1; }

        @keyframes morph {
            0%   { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            25%  { border-radius: 40% 60% 70% 30% / 40% 70% 30% 60%; }
            50%  { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            75%  { border-radius: 55% 45% 40% 60% / 65% 35% 55% 45%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }

        /* ── Pill button ── */
        .pill-btn {
            position: fixed;
            bottom: clamp(1.5rem, 5vh, 2.5rem);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            pointer-events: auto;
            padding: clamp(0.75rem, 2vw, 1rem) clamp(2.5rem, 8vw, 4rem);
            border: 1.5px solid rgba(255,255,255,0.35);
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            color: #ffffff;
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            font-family: inherit;
            letter-spacing: 0.2em;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            -webkit-touch-callout: none;
        }
        .pill-btn.visible { opacity: 1; pointer-events: auto; }
        .pill-btn:hover {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>

    <div class="liquid-blob" id="blob"></div>
    <button class="pill-btn" id="pillBtn">进入</button>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
    import * as THREE from 'three';

    /* ===================================================================
       Particle Text — Three.js WebGL + Liquid Spotlight Blob
       Auto-cycling: scatter ↔ 胡昊晖 with staggered cascading transitions
       Spring-damper repulsion + difference-blend spotlight
       =================================================================== */

    // ── DOM ──────────────────────────────────────────────
    const blobEl = document.getElementById('blob');
    const pillBtn = document.getElementById('pillBtn');

    // ── Canvas ──────────────────────────────────────────
    const canvas = document.createElement('canvas');
    Object.assign(canvas.style, {
        position: 'fixed', top: '0', left: '0',
        width: '100%', height: '100%',
        zIndex: '0', pointerEvents: 'none',
    });
    document.body.insertBefore(canvas, document.body.firstChild);

    // ── Scene / Camera / Renderer ──────────────────────
    let W = window.innerWidth;
    let H = window.innerHeight;

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 1000);
    camera.position.z = 130;

    const renderer = new THREE.WebGLRenderer({
        canvas, alpha: true, antialias: true, preserveDrawingBuffer: true,
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, W < 768 ? 1.5 : 2));
    renderer.setSize(W, H);
    renderer.setClearColor(0x000000, 0);

    // ── Particle buffers ───────────────────────────────
    const N = 8000;
    const pos  = new Float32Array(N * 3);   // rendered (base + repulsion)
    const base = new Float32Array(N * 3);   // pure shape positions
    const src  = new Float32Array(N * 3);   // lerp start (snapshot at transition begin)
    const dst  = new Float32Array(N * 3);   // lerp target (scatter or text points)
    const del  = new Float32Array(N);       // per-particle stagger delay
    const col  = new Float32Array(N * 3);   // RGB colours

    // Repulsion displacement / velocity
    const repX  = new Float32Array(N);
    const repY  = new Float32Array(N);
    const repVX = new Float32Array(N);
    const repVY = new Float32Array(N);

    const MAX_DEL = 0.38;  // max stagger window (fraction of TRANS_DUR)

    // Initialise positions, delays & colours (all white particles)
    for (let i = 0; i < N; i++) {
        const x = (Math.random() - 0.5) * 300;
        const y = (Math.random() - 0.5) * 200;
        const z = (Math.random() - 0.5) * 100;
        pos[i*3]=x;  pos[i*3+1]=y;  pos[i*3+2]=z;
        base[i*3]=x; base[i*3+1]=y; base[i*3+2]=z;
        dst[i*3]=x;  dst[i*3+1]=y;  dst[i*3+2]=z;
        del[i] = Math.random() * MAX_DEL;
        const v = 0.45 + Math.random() * 0.55;  // random grey 0.45–1.0
        col[i*3]=v; col[i*3+1]=v; col[i*3+2]=v;
    }

    // ── Geometry / Material / Points ───────────────────
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));

    function createCircleTexture(size, color, alpha) {
        const c = document.createElement('canvas');
        c.width = size; c.height = size;
        const ctx = c.getContext('2d');
        ctx.beginPath();
        ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        const data = ctx.getImageData(0, 0, size, size);
        for (let i = 0; i < data.data.length; i += 4) {
            data.data[i + 3] = data.data[i + 3] > 128 ? alpha : 0;
        }
        ctx.putImageData(data, 0, 0);
        return new THREE.CanvasTexture(c);
    }
    const circleTex = createCircleTexture(64, '#ffffff', 255);

    const mat = new THREE.PointsMaterial({
        size: Math.max(0.7, Math.min(1.1, W / 1000)),
        map: circleTex,
        vertexColors: true,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.85,
        depthWrite: false,
        blending: THREE.NormalBlending,
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);

    // ── Responsive text params (adapts to viewport aspect ratio) ──
    function getTextParams() {
        const vFOV  = camera.fov * Math.PI / 180;
        const halfH = camera.position.z * Math.tan(vFOV / 2);
        const halfW = halfH * (W / H);
        // Chinese chars bigger, English smaller (more letters)
        return {
            xScale:  halfW * 2.0,
            yScale:  halfH * 1.8,
            cnFontSize: Math.max(170, Math.min(240, Math.round(halfH * 3.3))),
            enFontSize: Math.max(100, Math.min(150, Math.round(halfH * 2.0))),
        };
    }

    // ── Text sampling (wider offscreen canvas to prevent clipping) ──
    function sampleText(text, xScale, yScale, fontSize) {
        const ow = 1200, oh = 500;  // wide canvas ensures text never clips offscreen
        const oc = document.createElement('canvas');
        oc.width = ow; oc.height = oh;
        const ctx = oc.getContext('2d');
        ctx.clearRect(0, 0, ow, oh);
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${fontSize}px "PingFang SC","Microsoft YaHei","Heiti SC","Noto Sans SC",sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, ow / 2, oh / 2);

        const data = ctx.getImageData(0, 0, ow, oh).data;
        const out = [];
        const step = 5;
        for (let py = 0; py < oh; py += step) {
            for (let px = 0; px < ow; px += step) {
                if (data[((py * ow + px) * 4) + 3] > 128) {
                    out.push([
                        (px / ow - 0.5) * xScale,
                        -(py / oh - 0.5) * yScale,
                    ]);
                }
            }
        }
        return out;
    }

    // ── Shape data ──────────────────────────────────────
    let chinesePts = null;   // 胡昊晖
    let englishPts = null;   // HUHAOHUI

    function initTextShape() {
        const p = getTextParams();
        chinesePts = sampleText('胡昊晖', p.xScale, p.yScale, p.cnFontSize);
        englishPts = sampleText('HUHAOHUI', p.xScale, p.yScale, p.enFontSize);
    }
    document.fonts.ready.then(initTextShape);
    setTimeout(initTextShape, 2000);

    // ── Distribute points across N particles → dst[] ───
    function pointsToDst(pts) {
        if (!pts || pts.length === 0) {
            // Scatter — random distribution
            for (let i = 0; i < N; i++) {
                dst[i*3]   = (Math.random() - 0.5) * 300;
                dst[i*3+1] = (Math.random() - 0.5) * 200;
                dst[i*3+2] = (Math.random() - 0.5) * 100;
            }
            return;
        }
        const shuffled = pts.slice().sort(() => Math.random() - 0.5);
        for (let i = 0; i < N; i++) {
            const p = shuffled[i % shuffled.length];
            dst[i*3]   = p[0] + (Math.random() - 0.5) * 1.0;
            dst[i*3+1] = p[1] + (Math.random() - 0.5) * 1.0;
            dst[i*3+2] = (Math.random() - 0.5) * 4;
        }
    }

    // ── State machine ──────────────────────────────────
    // States: 0=scatter, 1=胡昊晖, 2=scatter, 3=HUHAOHUI → repeat
    const HOLD_TIMES   = [2.0, 5.0, 2.0, 5.0];   // [scatter, 胡昊晖, scatter, HUHAOHUI]
    const TRANS_DUR    = 3.2;                     // transition duration (s)

    let stateIdx      = 0;
    let stateTimer    = 0.0;
    let transitioning = false;
    let lerpT         = 0.0;
    let floatBlend    = 1.0;
    const FLOAT_FADE_DUR = 0.6;
    let animTime      = 0;

    function shapeForState(s) {
        switch (s) {
            case 1: return chinesePts;   // 胡昊晖
            case 3: return englishPts;   // HUHAOHUI
            default: return null;        // scatter
        }
    }

    function beginTransition() {
        stateIdx = (stateIdx + 1) % 4;
        src.set(base);                           // snapshot current base
        pointsToDst(shapeForState(stateIdx));    // write new dst
        lerpT         = 0.0;
        transitioning = true;
        stateTimer    = 0.0;

        // Button: fade in during text transition (JS-driven), 0.1s fade out on scatter
        if (stateIdx === 1) {
            pillBtn.textContent = '进入';
            pillBtn.classList.add('visible');
            pillBtn.style.transition = '';
        } else if (stateIdx === 3) {
            pillBtn.textContent = 'Enter';
            pillBtn.classList.add('visible');
            pillBtn.style.transition = '';
        } else {
            pillBtn.classList.remove('visible');
            pillBtn.style.transition = 'opacity 0.1s ease';
            pillBtn.style.opacity = '0';
        }
    }

    // ═══════════════════════════════════════════════════════
    // Mouse / Touch — shared by repulsion, blob & camera
    // ═══════════════════════════════════════════════════════
    let mouseNX = 0, mouseNY = 0;
    let mouseRawX = 0, mouseRawY = 0;

    // Blob lerp state
    let blobX = W / 2;
    let blobY = H / 2;
    const BLOB_HALF = 85;
    const BLOB_EASE = 0.07;

    const raycaster = new THREE.Raycaster();
    const zPlane    = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    const mWorld    = new THREE.Vector3();
    const ndcMouse  = new THREE.Vector2();

    function updateMouse(clientX, clientY) {
        if (!blobEl.classList.contains('active')) {
            blobEl.classList.add('active');
        }
        mouseNX   = (clientX / W - 0.5) * 2;
        mouseNY   = (clientY / H - 0.5) * 2;
        mouseRawX = clientX;
        mouseRawY = clientY;
    }

    window.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
    window.addEventListener('mouseleave', () => {
        mouseRawX = -9999; mouseRawY = -9999;
    });
    window.addEventListener('touchmove', (e) => {
        if (e.touches.length) updateMouse(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    window.addEventListener('touchend', () => {
        mouseRawX = -9999; mouseRawY = -9999;
    });

    // ── Repulsion constants ─────────────────────────────
    const REP_RADIUS = 55;
    const REP_FORCE  = 90;
    const SPRING_K   = 10;
    const DAMP_C     = 8;

    // ── Easing ─────────────────────────────────────────
    function easeQuintic(t) {
        return t < 0.5 ? 16*t*t*t*t*t : 1 - Math.pow(-2*t + 2, 5) / 2;
    }

    // ── Animation loop ─────────────────────────────────
    const clock = new THREE.Clock();
    let canvasFadedIn = false;

    function animate() {
        requestAnimationFrame(animate);

        let dt = Math.min(clock.getDelta(), 0.05);
        animTime   += dt;
        stateTimer += dt;

        // ── State transition trigger ──
        if (!transitioning && stateTimer > HOLD_TIMES[stateIdx]) {
            beginTransition();
        }

        // ── Position update ──
        if (transitioning) {
            // ── Staggered cascading transition ──
            lerpT += dt / TRANS_DUR;
            const done = lerpT >= 1.0;
            if (done) {
                lerpT = 1.0;
                transitioning = false;
                floatBlend = 0.0;  // fade float back in
                pillBtn.style.opacity = '';
                pillBtn.style.transition = '';  // release to CSS
            }

            for (let i = 0; i < N; i++) {
                const range  = 1.0 - del[i];
                const localT = Math.max(0, Math.min(1, (lerpT - del[i]) / range));
                const e      = easeQuintic(localT);
                base[i*3]   = src[i*3]   + (dst[i*3]   - src[i*3])   * e;
                base[i*3+1] = src[i*3+1] + (dst[i*3+1] - src[i*3+1]) * e;
                base[i*3+2] = src[i*3+2] + (dst[i*3+2] - src[i*3+2]) * e;
            }

            // Button fades in after 0.5s delay (text-forming transition only)
            if (stateIdx === 1 || stateIdx === 3) {
                const delay = 0.5 / TRANS_DUR;
                const btnT = Math.max(0, Math.min(1, (lerpT - delay) / (1 - delay)));
                pillBtn.style.opacity = easeQuintic(btnT);
            }
        } else {
            // ── Idle float animation ──
            floatBlend = Math.min(1.0, floatBlend + dt / FLOAT_FADE_DUR);
            const isScatter = (stateIdx % 2 === 0);

            for (let i = 0; i < N; i++) {
                const phase = i * 0.05;
                if (isScatter) {
                    // Scatter idle — wide organic float
                    base[i*3]   = dst[i*3]   + Math.sin(animTime * 0.18 + phase)       * 1.8 * floatBlend;
                    base[i*3+1] = dst[i*3+1] + Math.cos(animTime * 0.14 + phase * 1.3) * 1.8 * floatBlend;
                    base[i*3+2] = dst[i*3+2] + Math.sin(animTime * 0.30 + phase * 0.7) * 8.0 * floatBlend;
                } else {
                    // Text idle — subtle breath
                    base[i*3]   = dst[i*3]   + Math.sin(animTime * 0.50 + phase) * 0.30 * floatBlend;
                    base[i*3+1] = dst[i*3+1] + Math.cos(animTime * 0.40 + phase) * 0.30 * floatBlend;
                    base[i*3+2] = dst[i*3+2] + Math.sin(animTime * 0.60 + phase) * 1.2  * floatBlend;
                }
            }
        }

        // ── Repulsion physics (spring-damper on base) ──
        ndcMouse.set(
            (mouseRawX / W)  * 2 - 1,
           -(mouseRawY / H) * 2 + 1,
        );
        raycaster.setFromCamera(ndcMouse, camera);
        raycaster.ray.intersectPlane(zPlane, mWorld);
        const mwx = mWorld.x, mwy = mWorld.y;

        for (let i = 0; i < N; i++) {
            const bx = base[i*3], by = base[i*3+1];
            const dx = bx - mwx, dy = by - mwy;
            const d2 = dx*dx + dy*dy;
            if (d2 < REP_RADIUS * REP_RADIUS && d2 > 0.001) {
                const d    = Math.sqrt(d2);
                const fall = 1.0 - d / REP_RADIUS;  // 1 at cursor, 0 at edge
                repVX[i] += (dx / d) * fall * fall * REP_FORCE * dt;
                repVY[i] += (dy / d) * fall * fall * REP_FORCE * dt;
            }

            // Spring-damper pulls repulsion back to zero
            repVX[i] += (-SPRING_K * repX[i] - DAMP_C * repVX[i]) * dt;
            repVY[i] += (-SPRING_K * repY[i] - DAMP_C * repVY[i]) * dt;
            repX[i]  += repVX[i] * dt;
            repY[i]  += repVY[i] * dt;

            // Final position = base + repulsion
            pos[i*3]   = base[i*3]   + repX[i];
            pos[i*3+1] = base[i*3+1] + repY[i];
            pos[i*3+2] = base[i*3+2];
        }

        geo.attributes.position.needsUpdate = true;
        renderer.render(scene, camera);

        // ── Liquid blob spotlight lerp ──
        blobX += (mouseRawX - blobX) * BLOB_EASE;
        blobY += (mouseRawY - blobY) * BLOB_EASE;
        blobEl.style.transform = `translate(${blobX - BLOB_HALF}px, ${blobY - BLOB_HALF}px)`;

        // Fade canvas in on first frame
        if (!canvasFadedIn) {
            canvasFadedIn = true;
            canvas.style.transition = 'opacity 0.6s ease';
            canvas.style.opacity = '1';
        }

        // Camera parallax
        camera.position.x += (mouseNX *  8 - camera.position.x) * 0.04;
        camera.position.y += (-mouseNY * 5 - camera.position.y) * 0.04;
        camera.lookAt(0, 0, 0);
    }

    // ── Resize ─────────────────────────────────────────
    window.addEventListener('resize', () => {
        W = window.innerWidth;
        H = window.innerHeight;
        camera.aspect = W / H;
        camera.updateProjectionMatrix();
        renderer.setSize(W, H);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, W < 768 ? 1.5 : 2));
        mat.size = Math.max(0.7, Math.min(1.1, W / 1000));
        const p = getTextParams();
        chinesePts = sampleText('胡昊晖', p.xScale, p.yScale, p.cnFontSize);
        englishPts = sampleText('HUHAOHUI', p.xScale, p.yScale, p.enFontSize);
    });

    // ── Boot ───────────────────────────────────────────
    function startFirstTransition() {
        if (!chinesePts || chinesePts.length === 0 || !englishPts || englishPts.length === 0) {
            setTimeout(startFirstTransition, 100);
            return;
        }
        stateTimer = HOLD_TIMES[0] + 0.1; // force first scatter → 胡昊晖 transition
    }
    setTimeout(startFirstTransition, 300);

    animate();
    </script>
</body>
</html>
